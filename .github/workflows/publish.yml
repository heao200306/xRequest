name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    name: Publish Packages v${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: |
          pnpm build:core
          pnpm build:xhr
          pnpm build:fetch
          pnpm build:entry
          pnpm build:main

      - name: Update @xrequest/core version
        run: |
          cd packages/core
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          cd ../..

      - name: Publish @xrequest/core
        run: |
          cd packages/core
          npm publish --access public
          cd ../..
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update @xrequest/xhr version
        run: |
          cd packages/xhr
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          sed -i 's/"@xrequest\/core": "workspace:\*"/"@xrequest\/core": "${{ github.event.inputs.version }}"/' package.json
          cd ../..

      - name: Publish @xrequest/xhr
        run: |
          cd packages/xhr
          npm publish --access public
          cd ../..
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update @xrequest/fetch version
        run: |
          cd packages/fetch
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          sed -i 's/"@xrequest\/core": "workspace:\*"/"@xrequest\/core": "${{ github.event.inputs.version }}"/' package.json
          cd ../..

      - name: Publish @xrequest/fetch
        run: |
          cd packages/fetch
          npm publish --access public
          cd ../..
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update @xrequest/entry version
        run: |
          cd packages/entry
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          sed -i 's/"@xrequest\/core": "workspace:\*"/"@xrequest\/core": "${{ github.event.inputs.version }}"/' package.json
          sed -i 's/"@xrequest\/xhr": "workspace:\*"/"@xrequest\/xhr": "${{ github.event.inputs.version }}"/' package.json
          sed -i 's/"@xrequest\/fetch": "workspace:\*"/"@xrequest\/fetch": "${{ github.event.inputs.version }}"/' package.json
          cd ../..

      - name: Publish @xrequest/entry
        run: |
          cd packages/entry
          npm publish --access public
          cd ../..
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update xrequest version
        run: |
          cd packages/xrequest
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          sed -i 's/"@xrequest\/core": "workspace:\*"/"@xrequest\/core": "${{ github.event.inputs.version }}"/' package.json
          sed -i 's/"@xrequest\/xhr": "workspace:\*"/"@xrequest\/xhr": "${{ github.event.inputs.version }}"/' package.json
          sed -i 's/"@xrequest\/fetch": "workspace:\*"/"@xrequest\/fetch": "${{ github.event.inputs.version }}"/' package.json
          sed -i 's/"@xrequest\/entry": "workspace:\*"/"@xrequest\/entry": "${{ github.event.inputs.version }}"/' package.json
          cd ../..

      - name: Publish xrequest
        run: |
          cd packages/xrequest
          npm publish --access public
          cd ../..
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git Tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag v${{ github.event.inputs.version }}
          git push origin main --tags
